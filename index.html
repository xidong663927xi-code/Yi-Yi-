/* 将这一段完整复制到你的 index.html 的 <style> 标签里 */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #f5efe7;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    padding: 1.5rem;
}
.container {
    max-width: 880px;
    margin: 0 auto;
    background: white;
    border-radius: 2rem;
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
    padding: 2rem;
}
header {
    text-align: center;
    border-bottom: 1px solid #e6dfd7;
    padding-bottom: 1rem;
    margin-bottom: 2rem;
}
h1 {
    color: #2c5e2a;
    font-size: 1.8rem;
}
.card {
    background: #fefaf5;
    border-radius: 1.2rem;
    padding: 1.2rem;
    margin-bottom: 1rem;
    border: 1px solid #ede3d9;
}
.card h3 {
    color: #2c5e2a;
    margin-bottom: 0.5rem;
}
.image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
    gap: 1rem;
    margin: 1rem 0;
}
.image-item {
    border-radius: 1rem;
    overflow: hidden;
    cursor: pointer;
    transition: 0.2s;
}
.image-item img {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: cover;
}
.audio-item {
    background: #fefaf5;
    border-radius: 1rem;
    padding: 1rem;
    margin-bottom: 0.8rem;
}
audio {
    width: 100%;
    margin-top: 0.5rem;
}
footer {
    margin-top: 2rem;
    text-align: center;
    color: #b3a18e;
}
/* 模态框等其他样式保持默认即可 */
