<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>牧羊网·分享站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5efe7;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            color: #2c2a29;
            padding: 0;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            background: #ffffff;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.03);
            min-height: 100vh;
            padding: 2.5rem 2rem 3rem;
        }

        /* 头部区域 - 简洁留白 */
        header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e6dfd7;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #2c5e2a;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
        }

        .site-desc {
            color: #8f7a66;
            font-size: 0.9rem;
            margin-top: 0.4rem;
        }

        /* 文字卡片 - 阅读友好 */
        .text-sections {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .card {
            background: transparent;
            border-radius: 0;
            padding: 0;
            border: none;
        }

        .card h3 {
            font-size: 1.5rem;
            font-weight: 500;
            color: #2c5e2a;
            margin-bottom: 0.8rem;
            letter-spacing: -0.2px;
        }

        .card p {
            color: #4b3f35;
            font-size: 1rem;
            white-space: pre-wrap;
            line-height: 1.7;
        }

        /* 区块标题 - 克制但清晰 */
        .section-title {
            font-size: 1.4rem;
            font-weight: 500;
            margin: 2.2rem 0 1.2rem 0;
            color: #2c5e2a;
            padding-bottom: 0.3rem;
            border-bottom: 2px solid #e0d6ce;
            display: inline-block;
        }

        /* 图片网格 - 干净网格 */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
            margin: 1.2rem 0 1rem;
        }

        .image-item {
            background: #fefcf9;
            border-radius: 1rem;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            border: 1px solid #ede3d9;
        }

        .image-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.1);
        }

        .image-item img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            display: block;
            background: #f0eae4;
        }

        .image-caption {
            padding: 0.8rem;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 450;
            color: #6b5a4a;
            background: white;
        }

        /* 录音列表 - 简洁播放列表 */
        .audio-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 1rem 0 1.5rem;
        }

        .audio-item {
            background: #fefcf9;
            border-radius: 1rem;
            padding: 1rem 1.2rem;
            border: 1px solid #ede3d9;
            transition: background 0.2s;
        }

        .audio-title {
            font-weight: 600;
            font-size: 1rem;
            color: #2c5e2a;
            margin-bottom: 0.1rem;
        }

        .audio-meta {
            font-size: 0.75rem;
            color: #9f8b78;
            margin-bottom: 0.5rem;
        }

        audio {
            width: 100%;
            margin-top: 0.5rem;
            border-radius: 40px;
            outline: none;
        }

        footer {
            margin-top: 3rem;
            text-align: center;
            padding-top: 1.8rem;
            border-top: 1px solid #e6dfd7;
            color: #b3a18e;
            font-size: 0.75rem;
        }

        /* 图片模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 0.75rem;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
        }

        .modal-close {
            position: absolute;
            top: 25px;
            right: 35px;
            font-size: 42px;
            font-weight: 300;
            color: white;
            cursor: pointer;
            background: none;
            border: none;
            font-family: monospace;
        }

        @media (max-width: 680px) {
            .container {
                padding: 1.5rem;
            }
            h1 {
                font-size: 1.6rem;
            }
            .card h3 {
                font-size: 1.3rem;
            }
            .image-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div style="text-align: center; padding: 3rem; color: #9c8a78;">✨ 加载中...</div>
</div>

<div id="imageModal" class="modal">
    <span class="modal-close">&times;</span>
    <img id="modalImg" src="" alt="放大图片">
</div>

<script>
    async function loadData() {
        try {
            const response = await fetch('./data.json?t=' + Date.now());
            if (!response.ok) throw new Error('data.json 无法加载');
            const data = await response.json();

            // 头部
            let html = `
                <header>
                    <h1>${escapeHtml(data.site_title || '牧羊网')}</h1>
                    <div class="site-desc">${escapeHtml(data.site_description || '耶和华是我的牧者')}</div>
                </header>
            `;

            // 文字区
            if (data.text_sections && data.text_sections.length) {
                html += `<div class="text-sections">`;
                for (let sec of data.text_sections) {
                    html += `
                        <div class="card">
                            <h3>${escapeHtml(sec.title)}</h3>
                            <p>${escapeHtml(sec.content).replace(/\n/g, '<br>')}</p>
                        </div>
                    `;
                }
                html += `</div>`;
            }

            // 图片区
            if (data.gallery && data.gallery.length) {
                html += `<div class="section-title">📷 图片记忆</div>`;
                html += `<div class="image-grid">`;
                for (let img of data.gallery) {
                    html += `
                        <div class="image-item" onclick="openModal('images/${img.file}')">
                            <img src="images/${img.file}" alt="${escapeHtml(img.caption)}" onerror="this.src='https://placehold.co/600x450?text=未加载'">
                            <div class="image-caption">${escapeHtml(img.caption)}</div>
                        </div>
                    `;
                }
                html += `</div>`;
            }

            // 录音区
            if (data.audios && data.audios.length) {
                html += `<div class="section-title">🎙️ 讲道分享</div>`;
                html += `<div class="audio-list">`;
                for (let aud of data.audios) {
                    html += `
                        <div class="audio-item">
                            <div class="audio-title">${escapeHtml(aud.title)}</div>
                            <div class="audio-meta">${escapeHtml(aud.speaker || '')} ${aud.date ? '· ' + escapeHtml(aud.date) : ''}</div>
                            <audio controls preload="metadata" src="audios/${aud.file}"></audio>
                        </div>
                    `;
                }
                html += `</div>`;
            }

            html += `<footer>✝️ 愿你平安 · 心中常有亮光</footer>`;
            document.getElementById('app').innerHTML = html;
        } catch (err) {
            document.getElementById('app').innerHTML = `
                <div style="text-align:center; padding:2rem; color:#9e6b5e;">
                    无法加载内容，请检查 data.json 文件是否存在。<br>
                    <span style="font-size:0.8rem;">${err.message}</span>
                </div>
            `;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    window.openModal = function(src) {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');
        modal.style.display = 'flex';
        modalImg.src = src;
    };
    document.querySelector('.modal-close').addEventListener('click', () => {
        document.getElementById('imageModal').style.display = 'none';
    });
    window.onclick = function(e) {
        const modal = document.getElementById('imageModal');
        if (e.target === modal) modal.style.display = 'none';
    };

    loadData();
</script>
</body>
</html>
