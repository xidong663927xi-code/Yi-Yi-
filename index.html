<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>牧羊网·分享站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5efe7;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', sans-serif;
            padding: 1.5rem;
        }
        .container {
            max-width: 860px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.05);
            padding: 2rem;
        }
        header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid #e6dfd7;
            padding-bottom: 1rem;
        }
        h1 {
            font-size: 2rem;
            color: #2c5e2a;
        }
        .card {
            background: #fefaf5;
            border-radius: 1rem;
            padding: 1.2rem;
            margin-bottom: 1rem;
        }
        .card h3 {
            color: #2c5e2a;
            margin-bottom: 0.5rem;
        }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
            gap: 1rem;
            margin: 1rem 0;
        }
        .image-item {
            border: 1px solid #ede3d9;
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
        }
        .image-item img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }
        .audio-item {
            background: #fefaf5;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 0.8rem;
        }
        audio {
            width: 100%;
            margin-top: 0.5rem;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            color: #b3a18e;
        }
        .modal {
            display: none;
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }
        .modal img {
            max-width: 90%;
            max-height: 90%;
        }
        .modal-close {
            position: absolute;
            top:20px; right:30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container" id="app">加载中...</div>
<div id="imageModal" class="modal">
    <span class="modal-close">&times;</span>
    <img id="modalImg">
</div>
<script>
    async function load() {
        try {
            const res = await fetch('./data.json?t='+Date.now());
            if(!res.ok) throw new Error('data.json 加载失败');
            const data = await res.json();
            let html = `<header><h1>${escape(data.site_title)}</h1><div>${escape(data.site_description)}</div></header>`;
            if(data.text_sections) {
                for(let s of data.text_sections) {
                    html += `<div class="card"><h3>${escape(s.title)}</h3><p>${escape(s.content).replace(/\n/g,'<br>')}</p></div>`;
                }
            }
            if(data.gallery && data.gallery.length) {
                html += `<h2>📷 图片记忆</h2><div class="image-grid">`;
                for(let img of data.gallery) {
                    html += `<div class="image-item" onclick="openModal('images/${img.file}')"><img src="images/${img.file}" onerror="this.src='https://placehold.co/400x300?text=缺失'"><div>${escape(img.caption)}</div></div>`;
                }
                html += `</div>`;
            }
            if(data.audios && data.audios.length) {
                html += `<h2>🎙️ 讲道分享</h2>`;
                for(let aud of data.audios) {
                    html += `<div class="audio-item"><div><strong>${escape(aud.title)}</strong> ${escape(aud.speaker||'')}</div><audio controls src="audios/${aud.file}"></audio></div>`;
                }
            }
            html += `<footer>✝️ 愿你平安</footer>`;
            document.getElementById('app').innerHTML = html;
        } catch(e) {
            document.getElementById('app').innerHTML = `<p style="color:red;">加载失败：${e.message}</p>`;
        }
    }
    function escape(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    window.openModal = function(src) { let modal = document.getElementById('imageModal'); modal.style.display='flex'; document.getElementById('modalImg').src=src; };
    document.querySelector('.modal-close').onclick = () => document.getElementById('imageModal').style.display='none';
    window.onclick = e => { if(e.target === document.getElementById('imageModal')) document.getElementById('imageModal').style.display='none'; };
    load();
</script>
</body>
</html>
