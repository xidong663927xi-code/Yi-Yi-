/* 将这一段完整复制到你的 index.html 的 <style> 标签里 */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body { background: #121212; color: #e0e0e0; }
.container { background: #1e1e1e; box-shadow: none; }
h1 { color: #9bcd8c; }
.card, .audio-item { background: #2a2a2a; border-color: #333; }
.card h3 { color: #a5d6a5; }
footer { color: #6c6c6c; }
/* 其他元素同主题一 */
}
/* 模态框等其他样式保持默认即可 */
